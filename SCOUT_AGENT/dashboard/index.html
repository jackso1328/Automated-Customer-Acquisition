<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBI AI Acquisition Hub</title>
    <!-- Modern typography for a premium feel -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Abstract gradient mesh background -->
    <div class="background-mesh"></div>
    
    <header class="glass-nav">
        <div class="brand">
            <div class="logo-orb"></div>
            <div class="brand-text">
                <span class="sbi-text">SBI AI</span>
                <span class="app-title">Predictive Acquisition Hub</span>
            </div>
        </div>
        <div class="status-indicator">
            <div class="pulse-ring"></div>
            <span>Agent Swarm Active</span>
        </div>
    </header>

    <main class="dashboard-container">
        <!-- Animated Top Metrics -->
        <section class="metrics-grid">
            <div class="metric-card glass-card fade-in-up" style="animation-delay: 0.1s;">
                <div class="metric-icon icon-blue">📡</div>
                <div class="metric-data">
                    <h3>Verified Signals</h3>
                    <p id="metric-total" class="counter">0</p>
                </div>
            </div>
            <div class="metric-card glass-card fade-in-up" style="animation-delay: 0.2s;">
                <div class="metric-icon icon-green">⚡</div>
                <div class="metric-data">
                    <h3>High Propensity Leads</h3>
                    <p id="metric-high" class="counter">0</p>
                </div>
            </div>
            <div class="metric-card glass-card fade-in-up" style="animation-delay: 0.3s;">
                <div class="metric-icon icon-purple">💎</div>
                <div class="metric-data">
                    <h3>Predicted LTV Index</h3>
                    <p id="metric-ltv" class="counter">0</p>
                </div>
            </div>
        </section>

        <!-- Main Feed -->
        <section class="content-panel fade-in-up" style="animation-delay: 0.4s;">
            <div class="panel-header">
                <h2>Autonomous Intelligence Feed</h2>
                <div class="filter-group glass-filter">
                    <select id="product-filter">
                        <option value="all">All Predictions</option>
                        <option value="loan">Corporate Finance</option>
                        <option value="retail">Retail / Edu</option>
                    </select>
                    <button id="archive-toggle" class="archive-btn" title="Show/hide archived (P4) signals">
                        <span class="archive-icon">📦</span> Show Archived
                    </button>
                </div>
            </div>

            <div id="leads-grid" class="leads-grid">
                <div class="loading-state glass-card">
                    <div class="spinner"></div>
                    <p>Agents are analyzing global signals...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
